<!doctype html>
<html lang="nl-BE">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project — CHATEAUX REAL ESTATE</title>
    <meta name="description" content="Projectdetail van Chateaux Real Estate." />
    <link rel="canonical" href="./project.html" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="project" data-active-nav="projecten">
    <div class="announcement">
      <div class="container announcement__inner">
        <a href="mailto:info@grouponclin.be">info@grouponclin.be</a>
        <a href="tel:+3211260480">+32 (0)11 260 480</a>
      </div>
    </div>
    <header class="site-header" id="site-header"></header>
    <main class="site-main">
      <section class="project-hero">
        <div class="container project-hero__grid">
          <div class="project-hero__copy">
            <p class="eyebrow" data-project-location>Project</p>
            <h1 data-project-title>Projecttitel</h1>
            <p class="lead" data-project-intro></p>
            <div class="project-meta" data-project-meta></div>
            <div class="button-row">
              <a class="btn btn--primary" data-project-cta href="./contact.html">Neem contact op</a>
              <a class="btn btn--secondary" href="./projecten.html">Terug naar projecten</a>
            </div>
          </div>
          <div class="project-hero__panel panel">
            <img data-project-hero alt="" />
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container project-detail-grid">
          <article class="detail-card">
            <p class="eyebrow">Projectvisie</p>
            <blockquote data-project-quote></blockquote>
          </article>
          <article class="detail-card">
            <p class="eyebrow">Context</p>
            <p data-project-context></p>
          </article>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="section__heading">
            <div>
              <p class="eyebrow">Beelden</p>
              <h2>Visuele referenties van het project.</h2>
            </div>
          </div>
          <div class="gallery-rail gallery-rail--detail" data-project-gallery></div>
        </div>
      </section>
    </main>
    <footer class="site-footer" id="site-footer"></footer>
    <div class="cookie-banner" id="cookie-banner" hidden>
      <div class="cookie-banner__copy">
        <strong>Cookiebeleid</strong>
        <p>Cookies worden gebruikt om de site goed te laten werken.</p>
      </div>
      <div class="cookie-banner__actions">
        <button class="btn btn--secondary btn--small" type="button" data-cookie="decline">Weiger</button>
        <button class="btn btn--secondary btn--small" type="button" data-cookie="manage">Voorkeuren</button>
        <button class="btn btn--primary btn--small" type="button" data-cookie="accept">Accepteer alles</button>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
